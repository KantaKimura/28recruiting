<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プログリット 新卒採用 — 28卒</title>
  <link rel="stylesheet" href="../engine/slide.css">
  <link rel="stylesheet" href="../theme/progrit.css">
  <style>
    /* =========================================================
       recruiting-28 デッキ固有スタイル
       ========================================================= */

    /* 全スライド: 枠線 */
    .slide {
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    /* ── 1. ヒーロー ── */
    .slide-hero {
      background: #FFFFFF;
      justify-content: center;
      align-items: flex-start;
    }
    .hero-inner {
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      width: 100%;
    }
    .hero-tag {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--color-accent);
      border: 1px solid rgba(240,120,0,.35);
      padding: .4rem 1.6rem;
      border-radius: 100px;
      display: inline-block;
      align-self: flex-start;
    }
    .hero-title {
      font-size: clamp(3.5rem, 7vw, 5.8rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -.025em;
      background: linear-gradient(120deg, #F07800 0%, #FFAA44 60%, #F07800 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── 2. キーメッセージ ── */
    .slide-landing {
      border-left: none;
      background: #FFFFFF;
    }
    .recruit-msg {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      width: 100%;
      flex: 1;
      justify-content: center;
    }
    .rm-main {
      font-size: 4.5rem;
      font-weight: 900;
      line-height: 1.15;
      color: #1A1A1A;
    }
    .rm-divider {
      width: 3rem;
      height: 3px;
      background: var(--color-accent);
    }
    .rm-reason {
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1.65;
      color: #1A1A1A;
    }

    /* ── 3. だから28卒は15名 ── */
    .num-slide {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
      flex: 1;
      justify-content: center;
    }
    .num-line {
      font-size: 4.5rem;
      font-weight: 900;
      line-height: 1.3;
      color: #1A1A1A;
    }
    .num-line .num-big {
      color: var(--color-accent);
      font-size: 5.85rem;
    }
  </style>
</head>
<body>

<div class="deck">

  <!-- ===== 1. 表紙 ===== -->
  <section class="slide slide-hero">
    <div class="hero-inner">
      <span class="hero-tag">28卒 新卒採用</span>
      <div class="hero-title">プログリット 新卒採用</div>
    </div>
  </section>

  <!-- ===== 2. キーメッセージ ===== -->
  <section class="slide slide-landing">
    <div class="recruit-msg">
      <div class="rm-main">大量採用はしません。</div>
      <div class="rm-divider"></div>
      <div class="rm-reason">大事にしていることは、<br>一緒に会社の未来をつくっていく仲間を見つけることです。</div>
    </div>
  </section>

  <!-- ===== 3. だから28卒は15名 ===== -->
  <section class="slide slide-landing">
    <div class="num-slide">
      <div class="num-line">28卒は<span class="num-big">15名</span>の採用をします。</div>
    </div>
  </section>

</div>

<script src="../engine/slide.js"></script>
</body>
</html>
