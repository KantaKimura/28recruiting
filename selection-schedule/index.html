<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選考スケジュール — PROGRIT 28卒</title>
  <link rel="stylesheet" href="../engine/slide.css">
  <link rel="stylesheet" href="../theme/progrit.css">
  <style>
    /* =========================================================
       選考スケジュール スライド固有スタイル
       ========================================================= */

    .slide {
      background: #FAFAF7;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.06);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 3.5rem 4rem 2.5rem;
      gap: 0;
    }

    /* ── タイトル ── */
    .slide-title {
      font-size: 2.25rem;
      font-weight: 700;
      color: #111111;
      flex-shrink: 0;
      margin-bottom: 2.2rem;
    }
    .slide-title .orange { color: #F07800; }

    /* ── タイムライン全体コンテナ ── */
    .timeline-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
    }

    /* ── 月ラベル行 ── */
    .month-row {
      display: grid;
      grid-template-columns: 130px repeat(13, 1fr);
      align-items: center;
      margin-bottom: .6rem;
    }
    .month-spacer { /* 左ラベル用 */ }
    .month-label {
      font-size: 0.75rem;
      color: #999999;
      text-align: center;
      font-family: var(--font-mono);
    }

    /* ── レーン共通 ── */
    .lane-row {
      display: grid;
      grid-template-columns: 130px repeat(13, 1fr);
      align-items: center;
      height: 4.5rem;
      position: relative;
    }
    .lane-label-pill {
      font-size: 0.8rem;
      font-weight: 700;
      padding: .3rem .9rem;
      border-radius: 100px;
      white-space: nowrap;
      text-align: center;
      align-self: center;
      justify-self: flex-start;
    }
    .lane-label-pill.normal {
      background: #F0F0F0;
      color: #666666;
    }
    .lane-label-pill.special {
      background: #F07800;
      color: #FFFFFF;
    }

    /* ── 横軸線 ── */
    .axis-row {
      display: grid;
      grid-template-columns: 130px repeat(13, 1fr);
      align-items: center;
      height: 1px;
      margin: .4rem 0;
    }
    .axis-line {
      grid-column: 2 / 16;
      height: 1px;
      background: #DDDDDD;
    }

    /* ── バーコンテナ（グリッド上に重ねる） ── */
    .lane-bars {
      grid-column: 2 / 16;
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
    }

    /* ── バー共通 ── */
    .bar {
      position: absolute;
      height: 2.8rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      white-space: nowrap;
    }

    /* 通常フロー: 2月〜3月 → col 12〜13 (2/13幅) */
    .bar-normal {
      background: #E8E8E8;
      color: #555555;
      font-size: 0.875rem;
      /* 2月 = index 11, 3月(翌年) = index 12: 2ヶ月分 */
      left: calc(11 / 13 * 100%);
      width: calc(2 / 13 * 100%);
    }

    /* 特別フロー① 2Days: 4月〜7月 → col 1〜4 (4ヶ月) */
    .bar-intern {
      background: linear-gradient(90deg, #F07800 0%, #F5A623 100%);
      color: #FFFFFF;
      font-size: 1.0rem;
      left: calc(1 / 13 * 100%);
      width: calc(4 / 13 * 100%);
    }

    /* 特別フロー② 早期選考: 8月〜9月 → col 5〜6 (2ヶ月) */
    .bar-early {
      background: #E8850A;
      color: #FFFFFF;
      font-size: 0.875rem;
      left: calc(5 / 13 * 100% + 3px);
      width: calc(2 / 13 * 100% - 3px);
    }

    /* 特別フロー③ 内定: 10月 → col 7 (1ヶ月) */
    .bar-offer {
      background: #D43A35;
      color: #FFFFFF;
      font-size: 0.875rem;
      left: calc(7 / 13 * 100% + 3px);
      width: calc(1 / 13 * 100% - 3px);
    }

    /* ── アノテーション（SVG） ── */
    .annotation-wrap {
      grid-column: 2 / 16;
      position: relative;
      height: 3rem;
      pointer-events: none;
    }
    .annotation-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* ── フッター ── */
    .footer-text {
      font-size: 0.875rem;
      color: #333333;
      text-align: center;
      flex-shrink: 0;
      margin-top: 1.6rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="deck">

  <section class="slide">

    <!-- タイトル -->
    <div class="slide-title">
      <span>選考</span><span class="orange">スケジュール</span>
    </div>

    <!-- タイムライン -->
    <div class="timeline-wrap">

      <!-- 月ラベル -->
      <div class="month-row">
        <div class="month-spacer"></div>
        <div class="month-label">3月</div>
        <div class="month-label">4月</div>
        <div class="month-label">5月</div>
        <div class="month-label">6月</div>
        <div class="month-label">7月</div>
        <div class="month-label">8月</div>
        <div class="month-label">9月</div>
        <div class="month-label">10月</div>
        <div class="month-label">11月</div>
        <div class="month-label">12月</div>
        <div class="month-label">1月</div>
        <div class="month-label">2月</div>
        <div class="month-label">3月</div>
      </div>

      <!-- 通常フローレーン -->
      <div class="lane-row">
        <div class="lane-label-pill normal">通常の選考フロー</div>
        <div class="lane-bars">
          <div class="bar bar-normal">ES → 面接（×5）</div>
        </div>
      </div>

      <!-- 横軸 -->
      <div class="axis-row">
        <div></div>
        <div class="axis-line"></div>
      </div>

      <!-- 特別フローレーン -->
      <div class="lane-row">
        <div class="lane-label-pill special">特別選考フロー</div>
        <div class="lane-bars">
          <div class="bar bar-intern">2 Days Internship</div>
          <div class="bar bar-early">早期選考</div>
          <div class="bar bar-offer">内定</div>
        </div>
      </div>

      <!-- アノテーション -->
      <div class="lane-row" style="height:3.5rem;">
        <div></div>
        <div class="lane-bars" style="position:relative;">
          <svg style="position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;" viewBox="0 0 1300 56" preserveAspectRatio="none">
            <!-- 内定バー中央(10月=col7) → 通常バー左端(2月=col11) の点線矢印 -->
            <!-- 内定バー中央: 7.5/13 * 1300 = 750 -->
            <!-- 通常バー左端: 11/13 * 1300 = 1100 -->
            <line x1="750" y1="4" x2="1100" y2="4"
              stroke="#D43A35" stroke-width="2" stroke-dasharray="6,4"
              marker-end="url(#arrowhead)"/>
            <defs>
              <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill="#D43A35"/>
              </marker>
            </defs>
            <text x="900" y="20" text-anchor="middle"
              font-size="22" font-weight="700" fill="#D43A35"
              font-family="'Noto Sans JP', sans-serif">約4ヶ月早い</text>
          </svg>
        </div>
      </div>

    </div>

    <!-- フッター -->
    <div class="footer-text">早期から就職活動を始め、当インターンにご参加いただいた皆さん限定の、特別選考ルートです。</div>

  </section>

</div>

<script src="../engine/slide.js"></script>
</body>
</html>
